<div *ngIf="dbReady; else loading" class="drawer drawer-mobile lg:drawer-open">
  <input #drawerInput id="app-drawer" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content flex flex-col min-h-screen bg-base-200">
    <!-- Mobile header -->
    <header class="lg:hidden navbar bg-base-100 border-b border-base-300 px-4 flex-none">
      <label for="app-drawer" class="btn btn-ghost btn-square drawer-button" aria-label="Open menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </label>
      <span class="font-bold text-lg ml-2">InvoiceScript</span>
    </header>
    <!-- Main content -->
    <main class="flex-1 overflow-y-auto min-h-0">
      <router-outlet></router-outlet>
    </main>
  </div>
  <div class="drawer-side">
    <label for="app-drawer" class="drawer-overlay" aria-label="Close menu"></label>
    <app-sidebar class="flex-shrink-0" (navClick)="closeDrawer()"></app-sidebar>
  </div>
</div>

<ng-template #loading>
  <div class="flex items-center justify-center h-screen bg-base-200">
    <div class="text-center">
      <ng-container *ngIf="!dbError">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <p class="mt-4 text-base-content/70">Initializing database...</p>
      </ng-container>
      <ng-container *ngIf="dbError">
        <div class="alert alert-error max-w-md">
          <span>&#9888; Database failed to initialize: {{ dbError }}</span>
        </div>
      </ng-container>
    </div>
  </div>
</ng-template>
